  <!-- Torii gate inside speech bubble -->
  <g fill="none" stroke="#6B7B8D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top beam (kasagi) - slightly curved -->
    <path d="M68 68 Q96 62 124 68"/>
    <!-- Second beam (nuki) -->
    <line x1="72" y1="78" x2="120" y2="78"/>
    <!-- Left pillar -->
    <line x1="78" y1="78" x2="78" y2="118"/>
    <!-- Right pillar -->
    <line x1="114" y1="78" x2="114" y2="118"/>
  </g>
</svg>
